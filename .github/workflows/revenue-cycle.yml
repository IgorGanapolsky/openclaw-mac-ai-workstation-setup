name: 24/7 Cloud Revenue Engine
on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch: # Allow manual trigger

jobs:
  revenue-cycle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Ralph Loop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Execute the discovery and outreach script
          node scripts/ralph-loop.mjs
          
          # 2. Commit and push the updated logs/packets
          git config --global user.name "OpenClaw Revenue Bot"
          git config --global user.email "bot@openclaw.io"
          git add reports/ lead-log.md current-revenue-state.md
          git commit -m "Cloud Cycle: Update revenue state and logs [skip ci]" || echo "No changes to commit"
          git push origin main

name: 24/7 Cloud Revenue Engine
on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  revenue-cycle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Ralph Loop (Verified Outreach)
        env:
          GITHUB_TOKEN: ${{ secrets.OUTREACH_TOKEN }}
        run: node scripts/ralph-loop.mjs

      - name: Create Update PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          DATE=$(date +%Y%m%d-%H%M)
          BRANCH_NAME="revenue-update-$DATE"
          git config --global user.name "OpenClaw Revenue Bot"
          git config --global user.email "bot@openclaw.io"
          git checkout -b "$BRANCH_NAME"
          
          # Stage files if they exist
          [ -d reports ] && git add reports/ || true
          [ -f lead-log.md ] && git add lead-log.md || true
          [ -f current-revenue-state.md ] && git add current-revenue-state.md || true
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Cloud Cycle: Update revenue state and logs ($DATE) [skip ci]"
            git push origin "$BRANCH_NAME"
            gh pr create --title "Cloud Revenue Cycle: $DATE" --body "Automated update from the hourly revenue engine." --base main --head "$BRANCH_NAME"
            # Auto-merge the PR to keep main updated (if enabled in repo)
            gh pr merge --auto --squash "$BRANCH_NAME" || echo "Auto-merge failed or not enabled"
          fi

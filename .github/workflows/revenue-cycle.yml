name: 24/7 Cloud Revenue Engine
on:
  schedule:
    - cron: '7 13 * * *' # Daily at 09:07 ET in DST. Was hourly; switched
                          # to daily because the discovery script writes
                          # to outbound/drafts/<date>/<repo>-<num>.md, and
                          # subsequent hourly runs on the same date just
                          # overwrite the same 5 files with the same content.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  revenue-cycle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run Ralph Loop (Verified Outreach)
        env:
          GITHUB_TOKEN: ${{ secrets.OUTREACH_TOKEN }}
        run: node scripts/ralph-loop.mjs

      - name: Create Update PR
        env:
          # Use PAT for both the push and the PR create — without this the
          # PR opens as github-actions[bot] and GH's recursive-trigger guard
          # blocks CI/CodeQL from running on it, leaving --auto-merge to
          # wait forever for required checks that never fire.
          GH_TOKEN: ${{ secrets.OUTREACH_TOKEN }}
          OUTREACH_TOKEN: ${{ secrets.OUTREACH_TOKEN }}
        run: |
          set -e
          DATE=$(date +%Y%m%d-%H%M)
          BRANCH_NAME="revenue-update-$DATE"
          # Rewrite remote so git push uses the PAT identity, not the default
          # GITHUB_TOKEN. This makes the PR appear from the PAT owner and
          # triggers downstream workflows (CI/CodeQL) on the resulting PR.
          git remote set-url origin "https://x-access-token:${OUTREACH_TOKEN}@github.com/${{ github.repository }}.git"
          git config --global user.name "OpenClaw Revenue Bot"
          git config --global user.email "bot@openclaw.io"
          git checkout -b "$BRANCH_NAME"
          
          # Stage discovery artifacts only. Per AGENTS.md/GEMINI.md hard
          # rules, the bot never modifies lead-log.md or current-revenue-state.md
          # (those are human-curated). ralph-loop.mjs only writes to
          # reports/ and outbound/drafts/, so those are the only staging targets.
          [ -d reports ] && git add reports/ || true
          [ -d outbound/drafts ] && git add outbound/drafts/ || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            # NOTE: no [skip ci] — required checks (validate, CodeQL,
            # GitGuardian, Socket) must run on every bot commit so a
            # leaked credential or malformed draft is caught before merge.
            git commit -m "Cloud Cycle: discovery + drafts ($DATE)"
            git push origin "$BRANCH_NAME"
            gh pr create --title "Cloud Revenue Cycle: $DATE" --body "Automated discovery run. Drafts under \`outbound/drafts/<date>/\` and report at \`reports/gtm/<date>/discovery.md\`. No comments posted automatically." --base main --head "$BRANCH_NAME"
            # Auto-merge once required checks pass. Without [skip ci],
            # the security scans (GitGuardian/Socket) and validate-site
            # run on the PR; auto-merge waits for green before merging.
            gh pr merge --auto --squash "$BRANCH_NAME" || echo "Auto-merge failed or not enabled"
          fi

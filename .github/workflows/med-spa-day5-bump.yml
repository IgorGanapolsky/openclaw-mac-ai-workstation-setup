name: Med Spa Day-5 Bump
# Day-5 follow-up bump for the 2026-05-19 Broward med-spa cold batch.
# Mirrors the martial-arts-day5-bump.yml workflow but for the med-spa
# vertical. Uses the same bump script in skool_top1percent (parametrized
# with --label) so log files stay separate per vertical.
#
# Default behavior on the schedule = DRY RUN. Real sends require an explicit
# workflow_dispatch with `apply: true` AND the RESEND_API_KEY repo secret.

on:
  schedule:
    # Daily at 13:23 UTC (6 minutes offset from the martial-arts cron at 13:17
    # so the two jobs don't compete for the runner pool in the same instant).
    # Starting 2026-05-24, the first eligible recipients hit Day +5 from the
    # 2026-05-19 batch.
    - cron: '23 13 * * *'
  workflow_dispatch:
    inputs:
      apply:
        description: 'Actually send via Resend (false = dry run, true = real send). Requires RESEND_API_KEY secret.'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      limit:
        description: 'Optional limit on the number of bumps to send (blank = no limit).'
        required: false
        default: ''
        type: string

permissions:
  contents: write

concurrency:
  group: med-spa-day5-bump
  cancel-in-progress: false

jobs:
  day5-bump:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == null || (github.event_name == 'schedule') }}
    steps:
      - name: Checkout this repo (openclaw — leads, log, replied.txt)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Checkout skool_top1percent (bump script + global suppression)
        uses: actions/checkout@v7
        with:
          repository: IgorGanapolsky/skool_top1percent
          token: ${{ secrets.OUTREACH_TOKEN }}
          path: _skool
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Resolve send mode
        id: mode
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.apply }}" == "true" ]]; then
            echo "apply_flag=--apply" >> "$GITHUB_OUTPUT"
            echo "mode=APPLY" >> "$GITHUB_OUTPUT"
          else
            echo "apply_flag=" >> "$GITHUB_OUTPUT"
            echo "mode=DRY_RUN" >> "$GITHUB_OUTPUT"
          fi
          if [[ -n "${{ inputs.limit }}" ]]; then
            echo "limit_flag=--limit ${{ inputs.limit }}" >> "$GITHUB_OUTPUT"
          else
            echo "limit_flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify RESEND_API_KEY is present when applying
        if: ${{ steps.mode.outputs.mode == 'APPLY' }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          if [[ -z "${RESEND_API_KEY:-}" ]]; then
            echo "::error::RESEND_API_KEY secret not configured but apply=true was requested."
            exit 1
          fi

      - name: Run Day-5 bump (med-spa label)
        env:
          RESEND_API_KEY: ${{ steps.mode.outputs.mode == 'APPLY' && secrets.RESEND_API_KEY || '' }}
        run: |
          set -euo pipefail
          mkdir -p data
          if [[ ! -e data/outreach_suppression.txt ]]; then
            ln -s ../_skool/data/outreach_suppression.txt data/outreach_suppression.txt
          fi
          python3 _skool/scripts/revenue_ops/send_martial_arts_day5_bump.py \
            --label med_spa_broward \
            --csv outbound/med-spas-broward-2026-05-19/leads.csv \
            --original-log reports/gtm/med_spa_broward_outreach_2026-05-19.json \
            --replied outbound/med-spas-broward-2026-05-19/replied.txt \
            ${{ steps.mode.outputs.apply_flag }} \
            ${{ steps.mode.outputs.limit_flag }}

      - name: Commit & push updated bump log
        if: ${{ steps.mode.outputs.mode == 'APPLY' }}
        run: |
          set -e
          rm -f data/outreach_suppression.txt
          rmdir data 2>/dev/null || true
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add reports/gtm/med_spa_broward_day5_bump_*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new bump log to commit"
          else
            git commit -m "chore(outreach): med-spa day-5 bump log [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
